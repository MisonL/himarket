services:
  himarket-server:
    build:
      context: ../../himarket-bootstrap
      args:
        INSTALL_ARTHAS: "false"
    image: himarket-server-local:dev
    environment:
      - DB_HOST=${DB_HOST:-mysql}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-portal_db}
      - DB_USERNAME=${DB_USERNAME:-portal_user}
      - DB_PASSWORD=${DB_PASSWORD:-himarket_app_2024}
      - AUTH_SESSION_STORE_TYPE=${AUTH_SESSION_STORE_TYPE:-REDIS}
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST:-redis-stack-server}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT:-6379}
      - HTTP_CLIENT_CONNECT_TIMEOUT=${HTTP_CLIENT_CONNECT_TIMEOUT:-PT5S}
      - HTTP_CLIENT_READ_TIMEOUT=${HTTP_CLIENT_READ_TIMEOUT:-PT30S}

      # Admin auth (global) - used by admin CAS/LDAP login.
      - ADMIN_AUTH_FRONTEND_REDIRECT_URL=http://localhost:${HIMARKET_ADMIN_PORT:-5174}

      - ADMIN_AUTH_CAS_CONFIGS_0_PROVIDER=cas
      - ADMIN_AUTH_CAS_CONFIGS_0_NAME=CAS
      - ADMIN_AUTH_CAS_CONFIGS_0_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_0_SLO_ENABLED=true
      # Public URL for browser redirects (CAS UI), via published port.
      - ADMIN_AUTH_CAS_CONFIGS_0_SERVER_URL=http://localhost:${CAS_HTTP_PORT:-8083}/cas
      # Internal URL for server-to-server ticket validation.
      - ADMIN_AUTH_CAS_CONFIGS_0_VALIDATE_ENDPOINT=http://cas:8080/cas/p3/serviceValidate
      - ADMIN_AUTH_CAS_CONFIGS_0_PROXY_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_0_PROXY_CALLBACK_PATH=http://himarket-server:8080/admins/cas/proxy-callback
      - ADMIN_AUTH_CAS_CONFIGS_0_PROXY_TARGET_SERVICE_PATTERN=^http://localhost:5174/.*$
      - ADMIN_AUTH_CAS_CONFIGS_0_PROXY_PROXY_ENDPOINT=http://cas:8080/cas/proxy
      - ADMIN_AUTH_CAS_CONFIGS_0_PROXY_POLICY_MODE=REST
      - ADMIN_AUTH_CAS_CONFIGS_0_PROXY_POLICY_ENDPOINT=https://proxy.example.com/policies
      - ADMIN_AUTH_CAS_CONFIGS_0_PROXY_POLICY_HEADERS_JSON={"X-Proxy-Policy":"enabled"}
      - ADMIN_AUTH_CAS_CONFIGS_0_SERVICE_DEFINITION_EVALUATION_ORDER=9
      - ADMIN_AUTH_CAS_CONFIGS_0_SERVICE_DEFINITION_RESPONSE_TYPE=POST
      - ADMIN_AUTH_CAS_CONFIGS_0_SERVICE_DEFINITION_LOGOUT_TYPE=FRONT_CHANNEL
      - ADMIN_AUTH_CAS_CONFIGS_0_SERVICE_DEFINITION_LOGOUT_URL=http://localhost:${HIMARKET_ADMIN_PORT:-5174}/login
      - ADMIN_AUTH_CAS_CONFIGS_0_ATTRIBUTE_RELEASE_MODE=DENY_ALL
      - ADMIN_AUTH_CAS_CONFIGS_0_ATTRIBUTE_RELEASE_ALLOWED_ATTRIBUTES_0=user
      - ADMIN_AUTH_CAS_CONFIGS_0_ATTRIBUTE_RELEASE_ALLOWED_ATTRIBUTES_1=mail
      - ADMIN_AUTH_CAS_CONFIGS_0_ATTRIBUTE_RELEASE_ALLOWED_ATTRIBUTES_2=displayName
      - ADMIN_AUTH_CAS_CONFIGS_0_MULTIFACTOR_POLICY_PROVIDERS_0=mfa-duo
      - ADMIN_AUTH_CAS_CONFIGS_0_MULTIFACTOR_POLICY_BYPASS_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_0_MULTIFACTOR_POLICY_FAILURE_MODE=OPEN
      - ADMIN_AUTH_CAS_CONFIGS_0_MULTIFACTOR_POLICY_FORCE_EXECUTION=true
      - ADMIN_AUTH_CAS_CONFIGS_0_AUTHENTICATION_POLICY_CRITERIA_MODE=EXCLUDED
      - ADMIN_AUTH_CAS_CONFIGS_0_AUTHENTICATION_POLICY_EXCLUDED_AUTHENTICATION_HANDLERS_0=BlockedHandler
      - ADMIN_AUTH_CAS_CONFIGS_0_EXPIRATION_POLICY_EXPIRATION_DATE=2030-12-31T23:59:59Z
      - ADMIN_AUTH_CAS_CONFIGS_0_EXPIRATION_POLICY_DELETE_WHEN_EXPIRED=true
      - ADMIN_AUTH_CAS_CONFIGS_0_EXPIRATION_POLICY_NOTIFY_WHEN_EXPIRED=true
      - ADMIN_AUTH_CAS_CONFIGS_0_EXPIRATION_POLICY_NOTIFY_WHEN_DELETED=true
      - ADMIN_AUTH_CAS_CONFIGS_0_CONTACTS_0_NAME=Admin SRE
      - ADMIN_AUTH_CAS_CONFIGS_0_CONTACTS_0_EMAIL=admin-sre@example.com
      - ADMIN_AUTH_CAS_CONFIGS_0_CONTACTS_0_PHONE=+86-21-87654321
      - ADMIN_AUTH_CAS_CONFIGS_0_CONTACTS_0_DEPARTMENT=Operations
      - ADMIN_AUTH_CAS_CONFIGS_0_CONTACTS_0_TYPE=TECHNICAL
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_SSO_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_STARTING_DATE_TIME=2026-01-01T09:00:00
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_ENDING_DATE_TIME=2026-12-31T18:00:00
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_ZONE_ID=Asia/Shanghai
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_REQUIRE_ALL_ATTRIBUTES=true
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_CASE_INSENSITIVE=true
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_REQUIRED_ATTRIBUTES_JSON={"memberOf":["internal","ops"],"region":["cn"]}
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_REJECTED_ATTRIBUTES_JSON={"status":["disabled"]}
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_UNAUTHORIZED_REDIRECT_URL=http://localhost:${HIMARKET_ADMIN_PORT:-5174}/forbidden
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_DELEGATED_AUTHENTICATION_POLICY_ALLOWED_PROVIDERS_0=GithubClient
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_DELEGATED_AUTHENTICATION_POLICY_PERMIT_UNDEFINED=false
      - ADMIN_AUTH_CAS_CONFIGS_0_ACCESS_STRATEGY_DELEGATED_AUTHENTICATION_POLICY_EXCLUSIVE=true
      - ADMIN_AUTH_CAS_CONFIGS_1_PROVIDER=cas-saml1
      - ADMIN_AUTH_CAS_CONFIGS_1_NAME=CAS SAML1
      - ADMIN_AUTH_CAS_CONFIGS_1_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_1_SLO_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_1_SERVER_URL=http://localhost:${CAS_HTTP_PORT:-8083}/cas
      - ADMIN_AUTH_CAS_CONFIGS_1_VALIDATE_ENDPOINT=http://cas:8080/cas/samlValidate
      - ADMIN_AUTH_CAS_CONFIGS_1_VALIDATION_PROTOCOL_VERSION=SAML1
      - ADMIN_AUTH_CAS_CONFIGS_1_VALIDATION_RESPONSE_FORMAT=XML
      - ADMIN_AUTH_CAS_CONFIGS_1_SERVICE_DEFINITION_EVALUATION_ORDER=13
      - ADMIN_AUTH_CAS_CONFIGS_1_SERVICE_DEFINITION_RESPONSE_TYPE=POST
      - ADMIN_AUTH_CAS_CONFIGS_1_SERVICE_DEFINITION_LOGOUT_TYPE=FRONT_CHANNEL
      - ADMIN_AUTH_CAS_CONFIGS_1_SERVICE_DEFINITION_LOGOUT_URL=http://localhost:${HIMARKET_ADMIN_PORT:-5174}/login
      - ADMIN_AUTH_CAS_CONFIGS_1_ATTRIBUTE_RELEASE_ALLOWED_ATTRIBUTES_0=user
      - ADMIN_AUTH_CAS_CONFIGS_1_ATTRIBUTE_RELEASE_ALLOWED_ATTRIBUTES_1=mail
      - ADMIN_AUTH_CAS_CONFIGS_2_PROVIDER=cas1
      - ADMIN_AUTH_CAS_CONFIGS_2_NAME=CAS1
      - ADMIN_AUTH_CAS_CONFIGS_2_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_2_SLO_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_2_SERVER_URL=http://localhost:${CAS_HTTP_PORT:-8083}/cas
      - ADMIN_AUTH_CAS_CONFIGS_2_VALIDATE_ENDPOINT=http://cas:8080/cas/validate
      - ADMIN_AUTH_CAS_CONFIGS_2_VALIDATION_PROTOCOL_VERSION=CAS1
      - ADMIN_AUTH_CAS_CONFIGS_2_VALIDATION_RESPONSE_FORMAT=XML
      - ADMIN_AUTH_CAS_CONFIGS_3_PROVIDER=cas2
      - ADMIN_AUTH_CAS_CONFIGS_3_NAME=CAS2
      - ADMIN_AUTH_CAS_CONFIGS_3_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_3_SLO_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_3_SERVER_URL=http://localhost:${CAS_HTTP_PORT:-8083}/cas
      - ADMIN_AUTH_CAS_CONFIGS_3_VALIDATE_ENDPOINT=http://cas:8080/cas/serviceValidate
      - ADMIN_AUTH_CAS_CONFIGS_3_VALIDATION_PROTOCOL_VERSION=CAS2
      - ADMIN_AUTH_CAS_CONFIGS_3_VALIDATION_RESPONSE_FORMAT=XML
      - ADMIN_AUTH_CAS_CONFIGS_3_AUTHENTICATION_POLICY_CRITERIA_MODE=ALL
      - ADMIN_AUTH_CAS_CONFIGS_3_AUTHENTICATION_POLICY_REQUIRED_AUTHENTICATION_HANDLERS_0=AcceptUsersAuthenticationHandler
      - ADMIN_AUTH_CAS_CONFIGS_3_AUTHENTICATION_POLICY_REQUIRED_AUTHENTICATION_HANDLERS_1=LdapAuthenticationHandler
      - ADMIN_AUTH_CAS_CONFIGS_3_AUTHENTICATION_POLICY_TRY_ALL=true
      - ADMIN_AUTH_CAS_CONFIGS_4_PROVIDER=cas-mfa
      - ADMIN_AUTH_CAS_CONFIGS_4_NAME=CAS MFA
      - ADMIN_AUTH_CAS_CONFIGS_4_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_4_SLO_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_4_SERVER_URL=http://localhost:${CAS_HTTP_PORT:-8083}/cas
      - ADMIN_AUTH_CAS_CONFIGS_4_VALIDATE_ENDPOINT=http://cas:8080/cas/p3/serviceValidate
      - ADMIN_AUTH_CAS_CONFIGS_4_VALIDATION_PROTOCOL_VERSION=CAS3
      - ADMIN_AUTH_CAS_CONFIGS_4_VALIDATION_RESPONSE_FORMAT=JSON
      - ADMIN_AUTH_CAS_CONFIGS_4_SERVICE_DEFINITION_EVALUATION_ORDER=5
      - ADMIN_AUTH_CAS_CONFIGS_4_MULTIFACTOR_POLICY_PROVIDERS_0=mfa-simple
      - ADMIN_AUTH_CAS_CONFIGS_4_MULTIFACTOR_POLICY_FORCE_EXECUTION=true
      - ADMIN_AUTH_CAS_CONFIGS_4_AUTHENTICATION_POLICY_CRITERIA_MODE=ANY
      - ADMIN_AUTH_CAS_CONFIGS_4_AUTHENTICATION_POLICY_REQUIRED_AUTHENTICATION_HANDLERS_0=SimpleTestUsernamePasswordAuthenticationHandler
      - ADMIN_AUTH_CAS_CONFIGS_4_AUTHENTICATION_POLICY_TRY_ALL=true
      - ADMIN_AUTH_CAS_CONFIGS_5_PROVIDER=cas-delegated
      - ADMIN_AUTH_CAS_CONFIGS_5_NAME=CAS Delegated
      - ADMIN_AUTH_CAS_CONFIGS_5_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_5_SLO_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_5_SERVER_URL=http://localhost:${CAS_HTTP_PORT:-8083}/cas
      - ADMIN_AUTH_CAS_CONFIGS_5_VALIDATE_ENDPOINT=http://cas:8080/cas/p3/serviceValidate
      - ADMIN_AUTH_CAS_CONFIGS_5_VALIDATION_PROTOCOL_VERSION=CAS3
      - ADMIN_AUTH_CAS_CONFIGS_5_VALIDATION_RESPONSE_FORMAT=JSON
      - ADMIN_AUTH_CAS_CONFIGS_5_SERVICE_DEFINITION_EVALUATION_ORDER=4
      - ADMIN_AUTH_CAS_CONFIGS_5_ACCESS_STRATEGY_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_5_ACCESS_STRATEGY_SSO_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_5_ACCESS_STRATEGY_DELEGATED_AUTHENTICATION_POLICY_ALLOWED_PROVIDERS_0=MockOidcClient
      - ADMIN_AUTH_CAS_CONFIGS_5_ACCESS_STRATEGY_DELEGATED_AUTHENTICATION_POLICY_PERMIT_UNDEFINED=false
      - ADMIN_AUTH_CAS_CONFIGS_5_ACCESS_STRATEGY_DELEGATED_AUTHENTICATION_POLICY_EXCLUSIVE=true
      - ADMIN_AUTH_CAS_CONFIGS_5_ACCESS_STRATEGY_HTTP_REQUEST_IP_ADDRESS_PATTERN=^127\\.0\\.0\\.1$
      - ADMIN_AUTH_CAS_CONFIGS_5_ACCESS_STRATEGY_HTTP_REQUEST_USER_AGENT_PATTERN=^curl/.*$
      - ADMIN_AUTH_CAS_CONFIGS_5_ACCESS_STRATEGY_HTTP_REQUEST_HEADERS_JSON={"X-Portal-Scope":"admin"}
      - ADMIN_AUTH_CAS_CONFIGS_5_IDENTITY_MAPPING_USER_ID_FIELD=user
      - ADMIN_AUTH_CAS_CONFIGS_5_IDENTITY_MAPPING_USER_NAME_FIELD=user
      - ADMIN_AUTH_CAS_CONFIGS_5_IDENTITY_MAPPING_EMAIL_FIELD=email
      - ADMIN_AUTH_CAS_CONFIGS_6_PROVIDER=cas-header
      - ADMIN_AUTH_CAS_CONFIGS_6_NAME=CAS Header
      - ADMIN_AUTH_CAS_CONFIGS_6_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_6_SLO_ENABLED=true
      - ADMIN_AUTH_CAS_CONFIGS_6_SERVER_URL=http://localhost:${CAS_HTTP_PORT:-8083}/cas
      - ADMIN_AUTH_CAS_CONFIGS_6_VALIDATE_ENDPOINT=http://cas:8080/cas/p3/serviceValidate
      - ADMIN_AUTH_CAS_CONFIGS_6_VALIDATION_PROTOCOL_VERSION=CAS3
      - ADMIN_AUTH_CAS_CONFIGS_6_VALIDATION_RESPONSE_FORMAT=JSON
      - ADMIN_AUTH_CAS_CONFIGS_6_SERVICE_DEFINITION_EVALUATION_ORDER=3
      - ADMIN_AUTH_CAS_CONFIGS_6_SERVICE_DEFINITION_RESPONSE_TYPE=HEADER
      - ADMIN_AUTH_CAS_CONFIGS_6_IDENTITY_MAPPING_USER_ID_FIELD=user
      - ADMIN_AUTH_CAS_CONFIGS_6_IDENTITY_MAPPING_USER_NAME_FIELD=user
      - ADMIN_AUTH_CAS_CONFIGS_6_IDENTITY_MAPPING_EMAIL_FIELD=mail

      - ADMIN_AUTH_LDAP_CONFIGS_0_PROVIDER=ldap
      - ADMIN_AUTH_LDAP_CONFIGS_0_NAME=LDAP
      - ADMIN_AUTH_LDAP_CONFIGS_0_ENABLED=true
      - ADMIN_AUTH_LDAP_CONFIGS_0_SERVER_URL=ldap://openldap:389
      - ADMIN_AUTH_LDAP_CONFIGS_0_BASE_DN=ou=people,dc=example,dc=org
      - ADMIN_AUTH_LDAP_CONFIGS_0_BIND_DN=cn=admin,dc=example,dc=org
      - ADMIN_AUTH_LDAP_CONFIGS_0_BIND_PASSWORD=${LDAP_ADMIN_PASSWORD:-admin}
      - ADMIN_AUTH_LDAP_CONFIGS_0_USER_SEARCH_FILTER=(uid={0})

  himarket-admin:
    build:
      context: ../../himarket-web/himarket-admin
    image: himarket-admin-local:dev

  himarket-frontend:
    build:
      context: ../../himarket-web/himarket-frontend
    image: himarket-frontend-local:dev
